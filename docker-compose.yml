version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kaizen_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: kaizenophtha_db
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./local_kaizen_pg_backup.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kaizen_backend
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=development
      - DB_DIALECT=postgres
      - MYSQLDB_HOST=db
      - MYSQLDB_USER=postgres
      - MYSQLDB_ROOT_PASSWORD=admin
      - MYSQLDB_PASSWORD=admin
      - MYSQLDB_DATABASE=kaizenophtha_db
      - DB_PORT=5432
      - NODE_LOCAL_PORT=4001
      - NODE_DOCKER_PORT=4001
      - SECRET=FdxJP%v7732WLPb3
      - SECRET_REFRESH=Cu8$8UqCXDXtzdoF
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: npm run dev
    restart: unless-stopped

  frontend:
    image: node:20
    container_name: kaizen_frontend
    working_dir: /app
    tty: true
    stdin_open: true
    ports:
      - "3005:3000"
    environment:
      - REACT_APP_API=http://localhost:4001/
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
      - HOST=0.0.0.0
      - NODE_OPTIONS=--max-old-space-size=4096
      - DISABLE_ESLINT_PLUGIN=true
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start
    restart: unless-stopped

volumes:
  db_data:
